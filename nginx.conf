server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:" always;

    include /etc/nginx/mime.types;

    # Add WASM MIME type (types+ merges instead of replacing)
    types {
        application/wasm wasm;
    }

    # Cache static assets (re-add security headers since nginx doesn't inherit add_header into child blocks)
    location ~* \.(js|css|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Serve files, fall back to index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log for health checks
    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
